name: Daily data refresh

# Re-runs the Season-9 extraction against the HuggingFace replay dataset and commits
# the refreshed data/ JSON so GitHub Pages serves up-to-date stats. Runs every day and
# can also be triggered manually from the Actions tab.
on:
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run extraction
        env:
          YXP_PROXY: ${{ github.workspace }}/pipeline
          YXP_OUTDIR: ${{ github.workspace }}/data
        run: python -u pipeline/season9_builds.py full

      - name: Commit refreshed data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/season9.json data/season9_builds.json data/season9_fates.json
          if git diff --cached --quiet; then
            echo "No data changes today."
          else
            git commit -m "Daily data refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
